services:
  carteira-investimento:
    build: .
    dns:
      - 8.8.8.8
      - 1.1.1.1
    ports:
      - "8501:8501"
    volumes:
      - ./acoes.csv:/app/acoes.csv
      - ~/.streamlit:/root/.streamlit
    environment:
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
    restart: unless-stopped